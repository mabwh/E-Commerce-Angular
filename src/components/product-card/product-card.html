<mat-card class="product-card" *ngIf="product">
    <img mat-card-image [src]="product.images?.length ? product.images[0].imageUrl : 'assets/placeholder.png'" [alt]="product.name">
    <mat-card-header>
        <mat-card-title>{{ product.name }}</mat-card-title>
        <mat-card-subtitle>${{ product.price }}</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
        <p>{{ product.description | slice:0:100 }}...</p>
        <p class="stock" [ngClass]="{ 'low-stock': product.stockQuantity < 10 }">
            Stock: {{ product.stockQuantity }}
        </p>
    </mat-card-content>
    <mat-card-actions>
        <button mat-button color="primary" [routerLink]="['/products', product.id]">View Details</button>
        <button mat-button color="accent" (click)="addToCart()">Add to Cart</button>
    </mat-card-actions>
</mat-card>
