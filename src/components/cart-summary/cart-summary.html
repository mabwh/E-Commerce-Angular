<mat-card class="cart-summary">
    <mat-card-header>
        <mat-card-title>Order Summary</mat-card-title>
    </mat-card-header>
    <mat-card-content>
        <div class="summary-row">
            <span>Items ({{ itemCount }})</span>
            <span>${{ subtotal }}</span>
        </div>
        <div class="summary-row" *ngIf="discount > 0">
            <span>Discount</span>
            <span class="discount">-${{ discount }}</span>
        </div>
        <div class="summary-row">
            <span>Tax (10%)</span>
            <span>${{ tax | number:'1.2-2' }}</span>
        </div>
        <div class="summary-row total">
            <span>Total</span>
            <span>${{ total }}</span>
        </div>
    </mat-card-content>
</mat-card>
