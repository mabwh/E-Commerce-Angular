<mat-card class="confirm-email-container">
    <mat-card-header>
        <mat-card-title>Confirm Email</mat-card-title>
    </mat-card-header>
    <mat-card-content>
        <div *ngIf="isLoading()" class="loading">
            <p>Confirming your email...</p>
        </div>
        <div *ngIf="!isLoading() && errorMessage()" class="error-message">
            {{ errorMessage() }}
        </div>
        <div *ngIf="!isLoading() && successMessage()" class="success-message">
            {{ successMessage() }}
        </div>
    </mat-card-content>
</mat-card>
