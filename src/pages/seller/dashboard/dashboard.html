<div class="dashboard-container">
    <div class="header">
        <h1>Seller Dashboard</h1>
        <button mat-raised-button color="primary" (click)="createProduct()">Add New Product</button>
    </div>

    <div *ngIf="isLoading()" class="loading">
        <mat-spinner></mat-spinner>
    </div>

    <div *ngIf="!isLoading() && errorMessage()" class="error-message">
        {{ errorMessage() }}
    </div>

    <div *ngIf="!isLoading() && products().length > 0" class="products-table">
        <table>
            <thead>
                <tr>
                    <th>Product Name</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let product of products()">
                    <td>{{ product.name }}</td>
                    <td>${{ product.price }}</td>
                    <td>{{ product.stockQuantity }}</td>
                    <td>
                        <button mat-button color="primary" (click)="editProduct(product.id)">Edit</button>
                        <button mat-button color="warn" (click)="deleteProduct(product.id)">Delete</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div *ngIf="!isLoading() && products().length === 0" class="no-products">
        <p>No products yet. Create your first product!</p>
        <button mat-raised-button color="primary" (click)="createProduct()">Create Product</button>
    </div>
</div>
