<div class="product-form-container">
    <h1>{{ isEditing() ? 'Edit Product' : 'Create Product' }}</h1>

    <mat-card>
        <mat-card-content>
            <div *ngIf="errorMessage()" class="error-message">{{ errorMessage() }}</div>

            <form [formGroup]="productForm" (ngSubmit)="onSubmit()">
                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Product Name</mat-label>
                    <input matInput formControlName="name">
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Description</mat-label>
                    <textarea matInput formControlName="description" rows="4"></textarea>
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Price</mat-label>
                    <input matInput formControlName="price" type="number" step="0.01">
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Stock Quantity</mat-label>
                    <input matInput formControlName="stockQuantity" type="number">
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Category ID</mat-label>
                    <input matInput formControlName="categoryId" type="number">
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Image URL</mat-label>
                    <input matInput formControlName="imageUrl">
                </mat-form-field>

                <div class="actions">
                    <button mat-button (click)="goBack()">Cancel</button>
                    <button mat-raised-button color="primary" type="submit"
                        [disabled]="productForm.invalid || isLoading()">
                        <span *ngIf="!isLoading()">{{ isEditing() ? 'Update' : 'Create' }}</span>
                        <span *ngIf="isLoading()">Saving...</span>
                    </button>
                </div>
            </form>
        </mat-card-content>
    </mat-card>
</div>
