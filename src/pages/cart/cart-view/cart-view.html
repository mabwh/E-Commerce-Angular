<div class="cart-container">
    <h1>Shopping Cart</h1>

    <div *ngIf="isLoading()" class="loading">
        <mat-spinner></mat-spinner>
    </div>

    <div *ngIf="!isLoading() && errorMessage()" class="error-message">
        {{ errorMessage() }}
    </div>

    <div *ngIf="!isLoading() && cart() && cart()!.items.length > 0" class="cart-content">
        <table class="cart-table">
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Total</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let item of cart()!.items">
                    <td>{{ item.productName }}</td>
                    <td>${{ item.unitPrice }}</td>
                    <td>
                        <input type="number" [(ngModel)]="item.quantity" min="1"
                        (change)="updateQuantity(item.id, item.quantity)" [attr.disabled]="!item.quantity">
                    </td>
                    <td>${{ item.lineTotal }}</td>
                    <td>
                        <button mat-button color="warn" (click)="removeItem(item.productId)">Remove</button>
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="cart-summary">
            <h3>Order Summary</h3>
            <p><strong>Subtotal:</strong> ${{ cart()!.subTotal }}</p>
            <p *ngIf="cart()!.discountAmount > 0"><strong>Discount:</strong> -${{ cart()!.discountAmount }}</p>
            <p class="total"><strong>Total:</strong> ${{ cart()!.total }}</p>
        </div>

        <div class="cart-actions">
            <button mat-button (click)="continueShopping()">Continue Shopping</button>
            <button mat-button color="warn" (click)="clearCart()">Clear Cart</button>
            <button mat-raised-button color="primary" (click)="checkout()">Proceed to Checkout</button>
        </div>
    </div>

    <div *ngIf="!isLoading() && (!cart() || cart()!.items.length === 0)" class="empty-cart">
        <p>Your cart is empty</p>
        <button mat-raised-button color="primary" (click)="continueShopping()">Continue Shopping</button>
    </div>
</div>
