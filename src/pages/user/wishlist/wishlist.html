<div class="wishlist-container">
    <h1>My Wishlist</h1>

    <div *ngIf="isLoading()" class="loading">
        <mat-spinner></mat-spinner>
    </div>

    <div *ngIf="!isLoading() && errorMessage()" class="error-message">
        {{ errorMessage() }}
    </div>

    <div *ngIf="!isLoading() && wishlist().length > 0" class="wishlist-grid">
        <mat-card *ngFor="let item of wishlist()" class="wishlist-item">
            <img [src]="item.productImageUrl || 'assets/placeholder.png'" alt="{{ item.productName }}" class="product-image">
            <mat-card-header>
                <mat-card-title>{{ item.productName }}</mat-card-title>
                <mat-card-subtitle>${{ item.price }}</mat-card-subtitle>
            </mat-card-header>
            <mat-card-content>
                <p>{{ (item.productName || 'Product') }}</p>
            </mat-card-content>
            <mat-card-actions>
                <button mat-button color="primary" (click)="viewProduct(item.productId)">View</button>
                <button mat-button color="warn" (click)="removeFromWishlist(item.productId)">Remove</button>
            </mat-card-actions>
        </mat-card>
    </div>

    <div *ngIf="!isLoading() && wishlist().length === 0" class="empty-wishlist">
        <p>Your wishlist is empty</p>
    </div>
</div>
