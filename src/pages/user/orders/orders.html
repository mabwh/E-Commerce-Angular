<div class="orders-container">
    <h1>My Orders</h1>

    <div *ngIf="isLoading()" class="loading">
        <mat-spinner></mat-spinner>
    </div>

    <div *ngIf="!isLoading() && errorMessage()" class="error-message">
        {{ errorMessage() }}
    </div>

    <div *ngIf="!isLoading() && orders().length > 0" class="orders-list">
        <mat-card *ngFor="let order of orders()" class="order-card">
            <mat-card-header>
                <mat-card-title>Order #{{ order.id }}</mat-card-title>
                <mat-card-subtitle>{{ order.orderDate | date:'short' }}</mat-card-subtitle>
            </mat-card-header>
            <mat-card-content>
                <p><strong>Status:</strong> {{ order.status }}</p>
                <p><strong>Total:</strong> ${{ order.totalAmount }}</p>
            </mat-card-content>
            <mat-card-actions>
                <button mat-button color="primary" (click)="viewOrder(order.id)">View Details</button>
            </mat-card-actions>
        </mat-card>
    </div>

    <div *ngIf="!isLoading() && orders().length === 0" class="no-orders">
        <p>You haven't placed any orders yet</p>
    </div>
</div>
