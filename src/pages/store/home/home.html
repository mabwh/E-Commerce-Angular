<div class="home-container">
    <h1>Welcome to Our Store</h1>

    <div *ngIf="isLoading()" class="loading">
        <mat-spinner></mat-spinner>
    </div>

    <div *ngIf="!isLoading() && errorMessage()" class="error-message">
        {{ errorMessage() }}
    </div>

    <div *ngIf="!isLoading() && products().length > 0" class="products-grid">
        <mat-card *ngFor="let product of products()" class="product-card">
            <img [src]="product.images?.length ? product.images[0].imageUrl : 'assets/placeholder.png'" alt="{{ product.name }}" class="product-image">
            <mat-card-header>
                <mat-card-title>{{ product.name }}</mat-card-title>
                <mat-card-subtitle>${{ product.price }}</mat-card-subtitle>
            </mat-card-header>
            <mat-card-content>
                <p>{{ product.description | slice:0:100 }}...</p>
            </mat-card-content>
            <mat-card-actions>
                <button mat-button color="primary" (click)="viewProduct(product.id)">View</button>
                <button mat-button color="accent" (click)="addToCart(product.id)">Add to Cart</button>
            </mat-card-actions>
        </mat-card>
    </div>

    <div *ngIf="!isLoading() && products().length === 0" class="no-products">
        <p>No products available</p>
    </div>

    <div class="pagination">
        <button mat-button (click)="previousPage()">Previous</button>
        <span>Page {{ currentPage() }}</span>
        <button mat-button (click)="nextPage()">Next</button>
    </div>
</div>
