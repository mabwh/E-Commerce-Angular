<div class="categories-container">
    <h1>Categories</h1>

    <div *ngIf="isLoading()" class="loading">
        <mat-spinner></mat-spinner>
    </div>

    <div *ngIf="!isLoading() && errorMessage()" class="error-message">
        {{ errorMessage() }}
    </div>

    <div *ngIf="!isLoading() && categories().length > 0" class="categories-grid">
        <mat-card *ngFor="let category of categories()" class="category-card">
            <mat-card-header>
                <mat-card-title>{{ category.name }}</mat-card-title>
            </mat-card-header>
            <mat-card-content>
                <p>{{ category.description }}</p>
            </mat-card-content>
            <mat-card-actions>
                <button mat-button color="primary" (click)="viewCategory(category.id)">View Products</button>
            </mat-card-actions>
        </mat-card>
    </div>

    <div *ngIf="!isLoading() && categories().length === 0" class="no-categories">
        <p>No categories available</p>
    </div>
</div>
